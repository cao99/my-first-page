<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能清单</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <main class="w-full max-w-md bg-white rounded-lg shadow p-8">
    <h1 class="text-2xl font-bold mb-4">我的技能清单</h1>

    <!-- 添加技能的输入区域 -->
    <div class="flex gap-2 mb-4">
      <input id="new-skill" type="text" placeholder="输入新技能"
        class="flex-1 rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <button id="add-btn"
        class="bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 transition-colors">
        添加
      </button>
    </div>

    <!-- 技能列表容器（JS 会往这里面动态插入 <li>） -->
    <ul id="skill-list" class="space-y-2"></ul>
  </main>

  <script>
    // 1. 定义技能数据（数组）
    let skills = ['HTML', 'CSS', 'JavaScript', 'Git', 'DevTools']

    // 2. 找到页面元素
    const skillList = document.querySelector('#skill-list')
    const newSkillInput = document.querySelector('#new-skill')
    const addBtn = document.querySelector('#add-btn')

    // 3. 渲染函数（map 版本）
    // 核心思路：map 把每项加工成 HTML 字符串 → join 拼成整段 → innerHTML 一次性渲染
    function renderList() {
      // skills.map(...) 返回一个字符串数组，每项是一段 <li> 的 HTML
      // .join('') 把数组拼成一个完整字符串（中间无分隔符）
      // 赋给 innerHTML 后，浏览器自动解析成真实 DOM 元素显示在页面上
      skillList.innerHTML = skills.map((skill) => {
        return `<li class="bg-gray-100 rounded px-3 py-2 text-sm flex items-center justify-between">
          <span>${skill}</span>
          <button class="delete-btn text-red-500 hover:text-red-700 font-bold text-lg leading-none" data-skill="${skill}">×</button>
        </li>`
      }).join('')

      // 删除按钮事件绑定
      // 因为 innerHTML 重写后，之前的事件监听全部失效（旧元素被销毁了）
      // 所以每次渲染完，需要重�给所有删除按钮绑定点击事件
      // querySelectorAll = 找到所有匹配的元素（返回一个列表）
      // .forEach = 对列表里每个按钮依次执行
      document.querySelectorAll('.delete-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          // btn.dataset.skill 读取按钮上 data-skill="xxx" 存的值
          // 知道了要删哪个技能，就用 filter 过滤掉它
          const skillToDelete = btn.dataset.skill
          skills = skills.filter((s) => s !== skillToDelete)
          renderList()  // 数据变了，重新渲染
        })
      })
    }

    // 4. 页面加载时，先渲染一次初始数据
    renderList()

    // 5. 点击"添加"按钮时，把新技能加入数组，再重新渲染
    addBtn.addEventListener('click', () => {
      const newSkill = newSkillInput.value.trim()

      if (newSkill.length === 0) {
        return
      }

      skills.push(newSkill)
      newSkillInput.value = ''
      renderList()
    })
  </script>
</body>
</html>
