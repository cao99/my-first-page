<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <main class="w-full max-w-md bg-white rounded-lg shadow p-8">
    <h1 class="text-2xl font-bold mb-4">用户列表</h1>
    <p class="text-sm text-gray-500 mb-4">数据来自 JSONPlaceholder（免费公开 API）</p>

    <!-- 加载状态提示 -->
    <p id="loading" class="text-blue-500 text-sm">加载中...</p>

    <!-- 错误状态提示（默认隐藏） -->
    <p id="error" class="text-red-500 text-sm hidden"></p>

    <!-- 用户列表容器 -->
    <ul id="user-list" class="space-y-2"></ul>
  </main>

  <script>
    // 1. 找到页面元素
    const userList = document.querySelector('#user-list')
    const loading = document.querySelector('#loading')
    const error = document.querySelector('#error')

    // 2. 异步函数：从服务器拉取用户数据并渲染
    // async = 标记这是一个异步函数（里面会用 await）
    async function loadUsers() {
      try {
        // fetch = 向服务器发起网络请求
        // await = 等服务器返回结果（可能要 0.5~2 秒）
        // 这个 API 会返回 10 个虚拟用户的数据
        const response = await fetch('https://jsonplaceholder.typicode.com/users')

        // response.json() = 把服务器返回的 JSON 文本解析成 JS 数组/对象
        // 也需要 await，因为解析也是异步操作
        const users = await response.json()

        // 隐藏"加载中"提示
        loading.classList.add('hidden')

        // 用 map 把用户数据加工成 HTML 字符串，再渲染到页面
        // 每个 user 是一个对象，包含 name、email、company.name 等字段
        userList.innerHTML = users.map((user) => {
          return `<li class="bg-gray-100 rounded px-4 py-3">
            <p class="font-medium text-gray-800">${user.name}</p>
            <p class="text-sm text-gray-500">${user.email}</p>
            <p class="text-xs text-gray-400">公司：${user.company.name}</p>
          </li>`
        }).join('')

      } catch (err) {
        // 如果请求失败（断网、服务器挂了等），执行这里
        loading.classList.add('hidden')
        error.textContent = '加载失败，请检查网络后刷新重试'
        error.classList.remove('hidden')
      }
    }

    // 3. 页面加载时，立即调用函数拉取数据
    loadUsers()
  </script>
</body>
</html>
