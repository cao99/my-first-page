<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人简介 - 张明</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4">
  
  <main class="max-w-2xl mx-auto">
    <article class="bg-white rounded-2xl shadow-lg shadow-slate-200/50 overflow-hidden">
      
      <!-- Avatar area -->
      <header class="pt-10 pb-6 flex flex-col items-center bg-gradient-to-b from-slate-50 to-white">
        <figure class="mb-6">
          <img 
            src="https://placehold.co/200x200" 
            alt="张明的头像" 
            class="w-32 h-32 rounded-full object-cover ring-4 ring-white shadow-md"
          >
        </figure>
        
        <!-- Name and role -->
        <div class="text-center">
          <h1 class="text-2xl font-bold text-slate-800 inline">张明</h1>
          <span class="text-slate-400 mx-2">·</span>
          <p class="text-sm text-slate-500 inline">高级前端工程师</p>
        </div>
      </header>
      
      <!-- About section -->
      <section class="px-8 py-6 border-t border-slate-100" aria-labelledby="about-heading">
        <h2 id="about-heading" class="sr-only">关于我</h2>
        <p class="text-slate-600 leading-relaxed text-center">
          你好！我是一名拥有8年经验的前端工程师，专注于 React 和 Vue 生态系统。
          热爱探索新技术，追求代码的优雅与性能的极致。业余时间喜欢写技术博客、
          参与开源项目，也热衷于摄影和徒步旅行。期待与志同道合的朋友交流合作！
        </p>
      </section>
      

      <!-- 联系表单 -->
      <section class="px-8 py-6 border-t border-slate-100" aria-labelledby="contact-form-heading">
        <h2 id="contact-form-heading" class="text-lg font-semibold text-slate-800 mb-4">联系我</h2>

        <form class="space-y-4">
          <div>
            <label for="name" class="block text-sm font-medium text-slate-700 mb-1">姓名</label>
            <input
              id="name"
              type="text"
              placeholder="请输入姓名"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400"
            >
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1">邮箱</label>
            <input
              id="email"
              type="email"
              placeholder="请输入邮箱"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400"
            >
          </div>

          <div>
            <label for="message" class="block text-sm font-medium text-slate-700 mb-1">留言</label>
            <textarea
              id="message"
              rows="4"
              placeholder="请输入留言"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full rounded-lg bg-slate-800 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700 transition-colors"
          >
            发送
          </button>
        </form>
      </section>

      <!-- Contact information -->
      <footer class="px-8 py-6 bg-slate-50 border-t border-slate-100">
        <h2 class="sr-only">联系方式</h2>
        <address class="not-italic flex flex-col sm:flex-row sm:justify-center gap-4 sm:gap-8">
          
          <!-- Email -->
          <a 
            href="mailto:zhangming@example.com" 
            class="flex items-center gap-2 text-slate-600 hover:text-slate-800 transition-colors justify-center"
          >
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
            <span class="text-sm">zhangming@example.com</span>
          </a>
          
          <!-- WeChat -->
          <div class="flex items-center gap-2 text-slate-600 justify-center">
            <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 01.598.082l1.584.926a.272.272 0 00.14.045c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 01-.023-.156.49.49 0 01.201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89l-.005-.033zm-2.048 2.524c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.969-.982z"/>
            </svg>
            <span class="text-sm">zhangming_dev</span>
          </div>
          
          <!-- GitHub -->
          <a
            href="https://github.com/zhangming"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center gap-2 text-slate-600 hover:text-slate-800 transition-colors justify-center"
          >
            <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.71 1.25 3.37.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.05 11.05 0 0 1 5.8 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.35.78 1.05.78 2.12 0 1.53-.01 2.76-.01 3.14 0 .31.21.68.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
            </svg>
            <span class="text-sm">查看张明的 GitHub 主页</span>
          </a>

        </address>
      </footer>
      
    </article>
    
    <!-- Copyright -->
    <p class="text-center text-xs text-slate-400 mt-6">
      © 2024 张明 · 保留所有权利
    </p>
  </main>
  
</body>
</html>
